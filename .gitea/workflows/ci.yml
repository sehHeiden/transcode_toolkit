name: CI/CD Pipeline

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  lint:
    name: Lint & Type Check
    runs-on: ubuntu-latest
    container:
      image: ghcr.io/astral-sh/uv:latest
    steps:
      - uses: actions/checkout@v4
      - run: uv python install 3.13
      - run: uv sync --frozen
      - run: uv run ruff check src/ tests/
      - run: uv run mypy src/

  test:
    name: Test
    runs-on: ubuntu-latest
    container:
      image: ghcr.io/astral-sh/uv:latest
    needs: lint
    steps:
      - uses: actions/checkout@v4
      - name: Install system dependencies
        run: apt-get update && apt-get install -y ffmpeg
      - run: uv python install 3.13
      - run: uv sync --frozen
      - run: uv run pytest tests/ --cov=src/transcode_toolkit --cov-report=term-missing

  build:
    name: Build Package
    runs-on: ubuntu-latest
    container:
      image: ghcr.io/astral-sh/uv:latest
    needs: test
    if: github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4
      - run: uv python install 3.13
      - run: uv build
      - uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/
