audio:
  size_keep_ratio: 0.95
  extensions:
    - .flac
    - .mp3
    - .wav
    - .aac
    - .m4a
    - .ogg
    - .opus
    - .wma
  presets:
    music:
      bitrate: "128k"
      application: "audio"
      min_snr_db: 70.0
      snr_bitrate_scale: true
    audiobook:
      bitrate: "64k"
      application: "voip"
      channels: 1
      min_snr_db: 50.0
      snr_bitrate_scale: true
    audiobook_stereo:
      bitrate: "96k"
      application: "voip"
      min_snr_db: 50.0
      snr_bitrate_scale: true
    high:
      bitrate: "192k"
      application: "audio"
      min_snr_db: 75.0
      snr_bitrate_scale: true
    low:
      bitrate: "96k"
      application: "audio"
      min_snr_db: 60.0
      snr_bitrate_scale: true

video:
  min_savings_percent: 10
  size_keep_ratio: 0.95
  extensions:
    - .mp4
    - .mkv
    - .avi
    - .mov
    - .wmv
    - .webm

global:
  workers: null
  create_backups: true
